const STATUSES = ['new','contacted','replied','ordered','dead'];
const STATUS_LABELS = {new:'🆕 New',contacted:'📩 Contacted',replied:'💬 Replied',ordered:'📦 Ordered',dead:'⛔ Dead'};

let notesData = {};  // {domain: {status, notes, updated}}

function loadNotes() {
  try {
    const raw = localStorage.getItem('reta_notes');
    if (raw) notesData = JSON.parse(raw);
  } catch(e) {}
}
function saveNotes() {
  localStorage.setItem('reta_notes', JSON.stringify(notesData));
  const now = new Date().toLocaleString();
  localStorage.setItem('reta_notes_updated', now);
  document.getElementById('lastSaved').textContent = 'Last saved: ' + now;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  const search = document.getElementById('search').value.toLowerCase();
  const chinaOnly = document.getElementById('chinaOnly').checked;
  const shipChina = document.getElementById('shipChinaOnly').checked;
  const statusF = document.getElementById('statusFilter').value;

  let filtered = SUPPLIERS.filter(s => {
    if (chinaOnly && !s.china_based) return false;
    if (shipChina && (notesData[s.domain]?.noChinaShipping || !s.ships_to_china)) return false;
    if (statusF && (notesData[s.domain]?.status || 'new') !== statusF) return false;
    if (search) {
      const haystack = (s.domain + ' ' + s.company + ' ' + s.location + ' ' + s.notes + ' ' + s.prices + ' ' + s.email + ' ' + s.whatsapp + ' ' + s.telegram).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('rowCount').textContent = `${filtered.length} / ${SUPPLIERS.length} suppliers`;
  tbody.innerHTML = '';

  // Update stats
  const totalCn = SUPPLIERS.filter(s => s.china_based).length;
  const totalShip = SUPPLIERS.filter(s => s.ships_to_china).length;
  const withPrice = SUPPLIERS.filter(s => s.prices && s.prices !== '—' && s.prices !== 'RFQ' && s.prices !== '').length;
  document.getElementById('stats-bar').innerHTML = `
    <span class="stat">📋 ${SUPPLIERS.length} suppliers</span>
    <span class="stat cn">🇨🇳 ${totalCn} China-based</span>
    <span class="stat">🚢 ${totalShip} ship to China</span>
    <span class="stat">💰 ${withPrice} has prices</span>
  `;

  filtered.forEach(s => {
    const entry = notesData[s.domain] || {};
    const status = entry.status || (s.outreach_status === 'contacted' ? 'contacted' : 'new');
    const ntxt = entry.notes || '';
    const noChinaShipping = entry.noChinaShipping === true;

    const cnClass = s.china_based ? 'cn' : 'non-cn';

    // Location + China badge
    let locHtml = s.location ? escapeHtml(s.location) : '—';
    if (s.china_based) {
      const conf = s.china_confirmed ? 'confirmed' : 'likely';
      locHtml = `<span class="badge badge-cn">CN ${conf}</span> ` + locHtml;
    } else if (s.location) {
      locHtml = `<span class="badge badge-not-cn">Non-CN</span> ` + locHtml;
    }

    // Ships to China
    let shipHtml = '—';
    if (s.ships_to_china) shipHtml = '<span class="badge badge-ship">✅ Yes</span>';
    else if (s.ships_to_china === false) shipHtml = '<span class="badge badge-not-cn">❌ No</span>';
    else shipHtml = '❓';

    // Batch group indicator
    let domainHtml = `<a class="domain-link" href="https://${s.domain}" target="_blank" rel="noopener">${s.domain}</a>`;
    if (s.batch_group) {
      domainHtml += ` <span class="batch-badge" title="Shared Janoshik test batch (same upstream): ${s.batch_group}">🔄</span>`;
    }

    // Certs
    const certHtml = s.certs && s.certs !== '—' ? escapeHtml(s.certs) : '—';

    // Price
    let priceHtml = '—';
    if (s.prices) {
      priceHtml = `<b>${escapeHtml(s.prices)}</b>`;
    } else if (s.price_notes) {
      priceHtml = `<span class="badge badge-rfq">RFQ</span>`;
    }
    if (s.price_notes) {
      priceHtml += `<div>${escapeHtml(s.price_notes)}</div>`;
    }

    // Contact
    let contactParts = [];
    if (s.email) contactParts.push(s.email);
    if (s.whatsapp) contactParts.push(s.whatsapp);
    if (s.wechat) contactParts.push('WeChat: ' + s.wechat);
    if (s.telegram) contactParts.push(s.telegram);
    const contactHtml = contactParts.length ? escapeHtml(contactParts.join(' | ')) : '—';

    // Source badge (Janoshik-tested vs discovery)
    if (s.source === 'discovery') {
      domainHtml += ` <span class="badge badge-ship" title="Newly discovered China source — not in Janoshik registry">🆕</span>`;
    }

    // Details: show all research data without truncation.
    const detailBlocks = [];
    if (s.notes) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Research:</span> ${escapeHtml(s.notes)}</div>`);
    if (s.outreach_status === 'contacted') {
      domainHtml += ` <span class="badge badge-contacted" title="${escapeHtml(s.outreach_detail)}">📨 Sent</span>`;
    } else if (s.outreach_status === 'manual_captcha') {
      domainHtml += ` <span class="badge badge-captcha" title="${escapeHtml(s.outreach_detail)}">🔐 CAPTCHA</span>`;
    } else if (s.outreach_status === 'no_form') {
      domainHtml += ` <span class="badge badge-no-form" title="${escapeHtml(s.outreach_detail)}">No form</span>`;
    }
    if (s.shipping_notes) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Shipping:</span> ${escapeHtml(s.shipping_notes)}</div>`);
    if (s.outreach_detail) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Outreach:</span> ${escapeHtml(s.outreach_detail)}</div>`);
    if (s.payment) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Payment:</span> ${escapeHtml(s.payment)}</div>`);
    if (s.other_products) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Other products:</span> ${escapeHtml(s.other_products)}</div>`);
    if (s.location_evidence) detailBlocks.push(`<div class="detail-block"><span class="detail-label">Location evidence:</span> ${escapeHtml(s.location_evidence)}</div>`);
    if (s.source_urls?.length) {
      detailBlocks.push(`<div class="detail-block"><span class="detail-label">Sources:</span>${s.source_urls.map(url => `<a class="source-link" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>`).join('')}</div>`);
    }
    const detailHtml = detailBlocks.length ? detailBlocks.join('') : '—';

    // Purity
    let purityHtml = '—';
    if (s.purity) {
      purityHtml = `<b>${escapeHtml(s.purity)}</b>`;
      if (s.test_count > 0) {
        purityHtml += ` <span class="badge-test" title="${s.test_count} tests on Janoshik">🔬${s.test_count}</span>`;
      }
    } else if (s.test_count > 0) {
      purityHtml = `<span class="badge-test" title="${s.test_count} tests on Janoshik">🔬${s.test_count} tests</span>`;
    }

    const tr = document.createElement('tr');
    tr.className = noChinaShipping ? 'no-cn-ship' : cnClass;
    tr.innerHTML = `
      <td>${domainHtml}</td>
      <td><b>${s.company ? escapeHtml(s.company) : '—'}</b></td>
      <td>${locHtml}</td>
      <td>${priceHtml}</td>
      <td>${s.moq ? escapeHtml(s.moq) : '—'}</td>
      <td class="notes-cell">${contactHtml}</td>
      <td>${shipHtml}</td>
      <td><label title="Mark after you confirm this supplier does not ship to mainland China"><input type="checkbox" ${noChinaShipping ? 'checked' : ''} onchange="updateNoChinaShipping('${s.domain}', this.checked)"> No</label></td>
      <td class="notes-cell">${certHtml}</td>
      <td>${purityHtml}</td>
      <td><select class="status" data-domain="${s.domain}" onchange="updateStatus('${s.domain}', this.value)">${STATUSES.map(st => `<option value="${st}"${status===st?' selected':''}>${STATUS_LABELS[st]}</option>`).join('')}</select></td>
      <td class="details-cell">${detailHtml}</td>
      <td><textarea data-domain="${s.domain}" onchange="updateNotes('${s.domain}', this.value)" placeholder="Your notes...">${escapeHtml(ntxt)}</textarea></td>
    `;
    // Title on domain for quick notes peek
    if (ntxt) tr.querySelector('td').title = ntxt;
    tbody.appendChild(tr);
  });
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Update functions
function updateStatus(domain, val) {
  if (!notesData[domain]) notesData[domain] = {};
  notesData[domain].status = val;
  notesData[domain].updated = new Date().toISOString();
  saveNotes();
  showToast(`Status updated to ${STATUS_LABELS[val] || val}`);
}
function updateNotes(domain, val) {
  if (!notesData[domain]) notesData[domain] = {};
  notesData[domain].notes = val;
  notesData[domain].updated = new Date().toISOString();
  saveNotes();
}
function updateNoChinaShipping(domain, checked) {
  if (!notesData[domain]) notesData[domain] = {};
  notesData[domain].noChinaShipping = checked;
  notesData[domain].updated = new Date().toISOString();
  saveNotes();
  renderTable();
  showToast(checked ? 'Marked: does not ship to China' : 'China-shipping warning cleared');
}

// Filters
function applyFilters() { renderTable(); }
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('chinaOnly').addEventListener('change', applyFilters);
document.getElementById('shipChinaOnly').addEventListener('change', applyFilters);
document.getElementById('statusFilter').addEventListener('change', applyFilters);

function downloadDatabase() {
  const download = document.createElement('a');
  download.href = window.location.href;
  download.download = 'retatrutide-suppliers.html';
  document.body.appendChild(download);
  download.click();
  download.remove();
  showToast('Download started. Export Notes separately to keep your contact history.');
}

// Export
function saveExport() {
  const blob = new Blob([JSON.stringify(notesData, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'reta-notes-export.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Notes exported!');
}
// Import
function importNotes(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Merge (import overwrites existing)
      Object.keys(imported).forEach(k => {
        if (imported[k] && typeof imported[k] === 'object') {
          notesData[k] = imported[k];
        }
      });
      saveNotes();
      renderTable();
      showToast(`Imported ${Object.keys(imported).length} entries.`);
    } catch(err) {
      showToast('Error importing file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
// Reset
function resetNotes() {
  if (confirm('Delete ALL notes and statuses? This cannot be undone.')) {
    notesData = {};
    saveNotes();
    renderTable();
    showToast('All notes cleared.');
  }
}

// Sorting
let sortCol = null, sortAsc = true;
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', function() {
    const col = this.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc','sorted-desc'));
    this.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
    sortSuppliers(col, sortAsc);
    renderTable();
  });
});
function sortSuppliers(col, asc) {
  SUPPLIERS.sort((a, b) => {
    let va = a[col] || '', vb = b[col] || '';
    if (col === 'china') { va = a.china_based ? '1' : '0'; vb = b.china_based ? '1' : '0'; }
    else if (col === 'ships') { va = a.ships_to_china ? '1' : '0'; vb = b.ships_to_china ? '1' : '0'; }
    else if (col === 'noChinaShip') { va = notesData[a.domain]?.noChinaShipping ? '1' : '0'; vb = notesData[b.domain]?.noChinaShipping ? '1' : '0'; }
    else if (col === 'status') { va = notesData[a.domain]?.status || 'new'; vb = notesData[b.domain]?.status || 'new'; }
    else if (col === 'price') { va = a.prices.toLowerCase(); vb = b.prices.toLowerCase(); }
    else if (col === 'purity') { va = parseFloat(a.purity) || 0; vb = parseFloat(b.purity) || 0; }
    else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
    if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
    return asc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
loadNotes();
renderTable();
</script>
